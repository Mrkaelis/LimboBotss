# =====================================================================
#  LimboBots — конфигурация
# =====================================================================

# Формат отображения бота в табе и в чате.
# Доступные плейсхолдеры:
#   %vcmute_status%     - косметическая имитация статуса "мута" в голосовом чате
#                          (у ботов нет реального голосового чата, это просто иконка)
#   %luckperms-prefix%  - префикс LuckPerms-группы, назначенной боту через
#                          /limbobots rank <бот> <группа>
#   %bot_name%          - имя бота
tab-format: " %vcmute_status% &f%luckperms-prefix%&7 %bot_name%"

vcmute:
  muted-symbol: "&c[X]"
  unmuted-symbol: ""
  # шанс, что у только что созданного бота будет "замьюченный" статус
  muted-chance: 0.15

# Пул для генерации "живых" ников ботов (не Bot_1, Bot_2, а что-то похожее на
# обычные никнеймы игроков). Из этого пула случайно берётся основа ника,
# а дальше с некоторым шансом добавляется цифровой суффикс, как у реальных игроков.
names:
  pool:
    - Alex
    - Maxim
    - Nikita
    - Dima
    - Vlad
    - Kirill
    - Ivan
    - Egor
    - Artem
    - Danil
    - Sasha
    - Roma
    - Pasha
    - Oleg
    - Denis
    - Stas
    - Yaroslav
    - Bogdan
    - Timur
    - Zhenya
    - Shadow
    - Ghost
    - Wolf
    - Storm
    - Phoenix
    - Raven
    - Hunter
    - Frost
    - Blaze
    - Nova
  # шанс добавить цифровой суффикс к нику (2-4 цифры)
  number-suffix-chance: 0.6

movement:
  # радиус (в блоках) вокруг точки спавна бота, в пределах которого он гуляет
  radius: 12
  # раз в сколько тиков бот выбирает новую точку для похода
  decide-interval-ticks: 60
  # длина одного шага бота за тик (чем меньше, тем плавнее и медленнее)
  step-size: 0.18

chat:
  enabled: true
  # средний интервал между сообщениями ботов, в тиках (20 тиков = 1 секунда)
  interval-ticks: 200
  messages:
    - "привет всем!"
    - "как дела на сервере?"
    - "го в бой"
    - "неплохой сервер, го дружить"
    - "кто может помочь с квестом?"
    - "лол"
    - "ору с этого"
    - "го замес"
    - "кто в топе сейчас?"
    - "интересно тут"
    - "фармлю ресы потихоньку"
    - "го пвп кто нибудь"

combat:
  enabled: true
  max-hp: 20
  # радиус, в котором бот ищет другого бота для "боя"
  pvp-radius: 6
  respawn-delay-seconds: 8
  # раз в сколько тиков боты решают: копать, драться или просто гулять
  action-interval-ticks: 100
  # шанс начать бой при наличии цели поблизости (0.0 - 1.0)
  pvp-chance: 0.3

mining:
  enabled: true
  radius: 6
  blocks:
    - OAK_LOG
    - BIRCH_LOG
    - STONE
    - COBBLESTONE
    - COAL_ORE
    - IRON_ORE
    - DIRT
    - GRAVEL

# Переопределение вида /tp и /teleport на сервере, чтобы они понимали
# имена ботов как обычные цели (см. README про ограничения этой замены).
tp-override:
  enabled: true
